<!DOCTYPE html>
<html lang="en" class="h-full bg-slate-50">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Professional Portfolio Builder Platform{% endblock %}</title>
    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        display: ['Space Grotesk', 'sans-serif'],
                        mono: ['JetBrains Mono', 'Fira Code', 'monospace']
                    }
                }
            }
        }
    </script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;550;600;700&family=JetBrains+Mono:wght@400;500&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Page Custom CSS print modes -->
    <style>
        [x-cloak] { display: none !important; }
        
        @media print {
            .print\:hidden { display: none !important; }
            .print\:shadow-none { box-shadow: none !important; }
            .print\:border-none { border: none !important; }
            body { background: white !important; color: black !important; }
        }
    </style>
</head>
<body class="h-full text-slate-800 font-sans flex flex-col justify-between" x-data="{ 
    toast: { show: false, message: '', type: 'info' },
    triggerToast(msg, type='info') {
        this.toast.message = msg;
        this.toast.type = type;
        this.toast.show = true;
        setTimeout(() => { this.toast.show = false; }, 3500);
    },
    spinner: false
}">

    <!-- GLOBAL ALERTER TOAST (Notification Banner) -->
    <div 
        id="toast_banner"
        x-cloak 
        x-show="toast.show" 
        x-transition:enter="transition ease-out duration-300"
        x-transition:enter-start="opacity-0 translate-y-3"
        x-transition:enter-end="opacity-100 translate-y-0"
        x-transition:leave="transition ease-in duration-200"
        x-transition:leave-start="opacity-100 translate-y-0"
        x-transition:leave-end="opacity-0 translate-y-3"
        class="fixed bottom-5 right-5 z-[100] max-w-sm px-4 py-3 rounded-xl border shadow-xl flex items-center gap-3 font-sans print:hidden"
        :class="{
            'bg-emerald-50 border-emerald-100 text-emerald-800': toast.type === 'success',
            'bg-rose-50 border-rose-100 text-rose-800': toast.type === 'error',
            'bg-indigo-50 border-indigo-100 text-indigo-800': toast.type === 'info'
        }"
    >
        <span class="text-lg" x-text="toast.type === 'success' ? '✓' : (toast.type === 'error' ? '⚠' : 'ℹ')"></span>
        <div class="text-xs font-semibold leading-relaxed" x-text="toast.message"></div>
    </div>

    <!-- MAIN LOADING INDICATOR OVERLAY -->
    <div 
        id="loading_overlay"
        x-cloak 
        x-show="spinner" 
        class="fixed inset-0 bg-slate-900/40 backdrop-blur-xs z-[200] flex items-center justify-center print:hidden"
    >
        <div class="bg-white px-6 py-5 rounded-2xl shadow-xl border border-slate-100 flex flex-col items-center gap-3">
            <svg class="animate-spin h-6 w-6 text-indigo-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4z"></path>
            </svg>
            <span class="text-[11px] font-bold text-slate-400 uppercase tracking-wider font-mono">Syncing credentials...</span>
        </div>
    </div>

    <!-- MAIN APP WRAPPER -->
    <main class="flex-grow">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER SECTION -->
    <footer class="bg-slate-900 text-slate-500 py-6 text-center text-[11px] font-mono border-t border-slate-800 print:hidden">
        <div class="max-w-7xl mx-auto px-4 flex flex-col md:flex-row justify-between items-center gap-3">
            <div>&copy; 2026 Developer Portfolio Builder Platform</div>
            <div class="flex gap-4">
                <a href="/" class="hover:text-slate-300 transition-colors">SignIn Panel</a>
                <a href="/jane" class="hover:text-slate-300 transition-colors">Jane Live Profile</a>
            </div>
        </div>
    </footer>

    <!-- Initialize general lucide icons if applicable -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
        });
    </script>
</body>
</html>
